name: Generate Gemfile.lock

on:
  workflow_dispatch

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
          bundler-cache: false

      - name: Generate Gemfile.lock
        run: bundle lock --no-update

      - name: Commit and Push
        uses: EndBug/add-and-commit@v9
        with:
          add: "Gemfile.lock"
          message: "Generate Gemfile.lock for reproducible builds"
