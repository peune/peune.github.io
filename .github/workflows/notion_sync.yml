name: Notion to Markdown Sync
on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch: # Allows you to run it manually

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: convert notion to markdown
        uses: ega4432/notion-to-markdown-action@v0
        with:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          output_path: '_posts'
          filename_property: 'slug' # We start with just the slug, Python fixes it

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Process Date and Cover
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python .github/scripts/process_cover.py

      - name: Commit and Push
        uses: EndBug/add-and-commit@v9
        with:
          add: "[ '_posts/*.md', 'img/*' ]"
          message: "Published post from Notion with custom date and cover"
